<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Workaround for environments that define window.fetch with only a getter.
      // This prevents polyfills (like formdata-polyfill or cross-fetch) from throwing
      // "Cannot set property fetch of #<Window> which has only a getter".
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { console.warn('Intercepted attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to apply fetch setter workaround', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
